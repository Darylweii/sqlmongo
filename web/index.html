                        </div>
                    </div>
                </div>
            `;
        }

        function buildClarificationGroupInnerHtml(messageId, group, groupIndex) {
            const candidates = Array.isArray(group.candidates) ? group.candidates : [];
            const totalCount = candidates.length;
            const totalPages = Math.max(1, Math.ceil(totalCount / CLARIFICATION_PAGE_SIZE));
            const state = getClarificationUiState(messageId, groupIndex);
            const page = Math.min(Math.max(Number(state.page) || 1, 1), totalPages);
            state.page = page;

            const pageStartIndex = (page - 1) * CLARIFICATION_PAGE_SIZE;
            const pageCandidates = candidates.slice(pageStartIndex, pageStartIndex + CLARIFICATION_PAGE_SIZE);
            const visibleStart = totalCount ? pageStartIndex + 1 : 0;
            const visibleEnd = pageStartIndex + pageCandidates.length;

            return `
                <div class="text-xs text-gray-500">\u5f85\u786e\u8ba4\u5173\u952e\u8bcd</div>
                <div class="mt-1 text-sm font-semibold text-gray-800">${escapeHtml(group.keyword || `\u76ee\u6807 ${groupIndex + 1}`)}</div>
                <div class="mt-2 flex items-center justify-between gap-3 flex-wrap text-xs text-amber-700">
                    <span>\u5171 ${totalCount} \u4e2a\u5019\u9009</span>
                    <span>\u5f53\u524d\u9875\u8303\u56f4 ${visibleStart}-${visibleEnd}</span>
                </div>
                <div class="mt-3 space-y-2">
                    ${pageCandidates.map((candidate, pageIndex) => buildClarificationCandidateCardHtml(messageId, groupIndex, candidate, pageStartIndex + pageIndex)).join('')}
                </div>
                ${totalPages > 1 ? `
                    <div class="mt-3 flex items-center justify-end gap-2 text-xs">
                        <button onclick="changeClarificationPage('${messageId}', ${groupIndex}, -1)" class="px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50" ${page <= 1 ? 'disabled' : ''}>\u4e0a\u4e00\u9875</button>
                        <span class="text-gray-500">\u7b2c ${page} / ${totalPages} \u9875</span>
                        <button onclick="changeClarificationPage('${messageId}', ${groupIndex}, 1)" class="px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50" ${page >= totalPages ? 'disabled' : ''}>\u4e0b\u4e00\u9875</button>
                    </div>
                ` : ''}
            `;
        }

        function renderClarificationGroup(messageId, groupIndex) {
            const groups = window['clarification_' + messageId];
            if (!Array.isArray(groups)) return;
            const group = groups[groupIndex];
            const container = document.getElementById(`clarification-group-${messageId}-${groupIndex}`);
            if (!group || !container) return;
            container.innerHTML = buildClarificationGroupInnerHtml(messageId, group, groupIndex);
        }

        function changeClarificationPage(messageId, groupIndex, delta) {
            const groups = window['clarification_' + messageId];
            if (!Array.isArray(groups)) return;
            const group = groups[groupIndex];
            const candidates = group && Array.isArray(group.candidates) ? group.candidates : [];
            const totalPages = Math.max(1, Math.ceil(candidates.length / CLARIFICATION_PAGE_SIZE));
            const state = getClarificationUiState(messageId, groupIndex);
            const nextPage = Math.min(Math.max((Number(state.page) || 1) + delta, 1), totalPages);
            if (nextPage === state.page) return;
            state.page = nextPage;
            renderClarificationGroup(messageId, groupIndex);
        }

        function prefillClarificationCandidate(messageId, groupIndex, candidateIndex) {
            const groups = window['clarification_' + messageId];
            if (!Array.isArray(groups)) return;
            const group = groups[groupIndex];
            const candidate = group && Array.isArray(group.candidates) ? group.candidates[candidateIndex] : null;
            if (!group || !candidate) return;

            const target = group.keyword || '这个目标';
            const deviceCode = candidate.device || '';
            const deviceName = candidate.name || '';
            const projectName = candidate.project_name || candidate.project_code_name || '';
            const parts = [`我说的${target}是${deviceCode}`];
            if (deviceName || projectName) {
                const detailParts = [];
                if (deviceName) detailParts.push(deviceName);
                if (projectName) detailParts.push(`项目：${projectName}`);
                parts.push(`（${detailParts.join('，')}）`);
            }

            const input = document.getElementById('chatInput');
            input.value = parts.join('');
            input.focus();
        }

        function buildAggregateScopeQuestion(originalQuestion, alias) {
            const normalizedAlias = String(alias || '').trim();
            const question = String(originalQuestion || '').trim();
            if (!normalizedAlias) return question;
            const aggregatePhrase = `汇总所有 ${normalizedAlias}`;
            if (!question) return aggregatePhrase;
            if (question.includes(aggregatePhrase)) return question;
            return question.includes(normalizedAlias)
                ? question.replace(normalizedAlias, aggregatePhrase)
                : `${aggregatePhrase}：${question}`;
        }

        function confirmClarificationCandidate(messageId, groupIndex, candidateIndex) {
            const groups = window['clarification_' + messageId] || [];
            const group = groups[groupIndex];
            const candidate = group && Array.isArray(group.candidates) ? group.candidates[candidateIndex] : null;
            const meta = window['clarification_meta_' + messageId];
            if (!group || !candidate) return;

            const alias = group.keyword || '当前设备';
            const deviceCode = candidate.device || '';
            const deviceName = candidate.name || '';
            const projectName = candidate.project_name || candidate.project_code_name || '';
            const isAggregateAllOption = String(candidate.match_type || '').trim() === 'aggregate_all_option' || String(candidate.scope_mode || '').trim() === 'aggregate_all';
            const details = [];
            if (deviceName) details.push(deviceName);
            if (projectName) details.push(`项目：${projectName}`);
            const detailText = details.length ? `（${details.join('，')}）` : '';
            const originalQuestion = String(meta && (meta.original_question || meta.query_params?.user_query) || '').trim();
            if (isAggregateAllOption) {
                const displayMessage = `已切换为跨项目汇总：${alias}${detailText}，继续查询原问题`;
                const nextMessage = buildAggregateScopeQuestion(originalQuestion, alias) || `汇总所有 ${alias}`;
                sendMessage(nextMessage, {
                    displayMessage,
                    skipChartFollowUp: true,
                });
                return;
            }
            const displayMessage = `已确认：${alias} -> ${deviceCode}${detailText}，继续查询原问题`;
            const nextMessage = originalQuestion || `${deviceCode}`;
            sendMessage(nextMessage, {
                displayMessage,
                aliasConfirmation: {
                    alias,
                    device: candidate.device,
                    name: candidate.name,
                    project_id: candidate.project_id,
                    project_name: candidate.project_name,
                    project_code_name: candidate.project_code_name,
                    device_type: candidate.device_type,
                    tg: candidate.tg,
                    match_type: candidate.match_type,
                    match_score: candidate.match_score,
                    matched_fields: candidate.matched_fields,
                    match_reason: candidate.match_reason,
                    original_question: originalQuestion,
                },
                skipChartFollowUp: true,
            });
        }

        function getScopeOriginalQuestion(meta) {
            return String(meta && (meta.original_question || meta.query_params?.user_query) || '').trim();
        }

        function requestScopeAliasReset(messageId, alias) {
            const meta = window['clarification_meta_' + messageId] || window['resolved_scope_meta_' + messageId] || null;
            const targetAlias = String(alias || '').trim();
            if (!targetAlias) return;
            const originalQuestion = getScopeOriginalQuestion(meta);
            const nextMessage = originalQuestion || `重新确认 ${targetAlias}`;
            sendMessage(nextMessage, {
                displayMessage: `重新确认 ${targetAlias}`,
                aliasConfirmation: {
                    action: 'reset_alias',
                    alias: targetAlias,
                    original_question: originalQuestion,
                },
                skipChartFollowUp: true,
            });
        }

        function requestClearResolvedScope(messageId) {
            const meta = window['clarification_meta_' + messageId] || window['resolved_scope_meta_' + messageId] || null;
            const originalQuestion = getScopeOriginalQuestion(meta);
            const nextMessage = originalQuestion || '清除当前确认范围';
            sendMessage(nextMessage, {
                displayMessage: '清除当前确认范围',
                aliasConfirmation: {
                    action: 'clear_scope',
                    original_question: originalQuestion,
                },
                skipChartFollowUp: true,
            });
        }

        function buildClarificationCandidatesHtml(messageId, responseMeta) {
            const groups = responseMeta && responseMeta.clarification_required && Array.isArray(responseMeta.clarification_candidates)
                ? responseMeta.clarification_candidates
                : [];
            if (!groups.length) return '';

            window['clarification_' + messageId] = groups;
            window['clarification_meta_' + messageId] = responseMeta;

            return `
                <div class="mt-3 rounded-xl border border-amber-200 bg-amber-50 p-3 space-y-3">
                    <div class="flex items-center justify-between gap-3 flex-wrap">
                        <div>
                            <div class="text-sm font-semibold text-amber-900">\u5019\u9009\u8bbe\u5907</div>
                            <div class="text-xs text-amber-700">\u547d\u4e2d\u4e0d\u786e\u5b9a\uff0c\u8bf7\u5148\u786e\u8ba4\u540e\u518d\u7ee7\u7eed\u67e5\u8be2</div>
                        </div>
                        <div class="text-xs text-amber-700">\u6bcf\u9875 10 \u6761\uff0c\u70b9\u51fb\u201c\u9009\u8fd9\u4e2a\u8bbe\u5907\u201d\u4f1a\u81ea\u52a8\u7ee7\u7eed\u67e5\u8be2</div>
                    </div>
                    ${groups.map((group, groupIndex) => {
                        const state = getClarificationUiState(messageId, groupIndex);
                        state.page = 1;
                        return `
                            <div class="rounded-lg border border-amber-100 bg-white p-3">
                                <div id="clarification-group-${messageId}-${groupIndex}">
                                    ${buildClarificationGroupInnerHtml(messageId, group, groupIndex)}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function buildResolvedScopeHtml(messageId, responseMeta) {
            const scope = responseMeta && responseMeta.resolved_scope;
            const items = scope && Array.isArray(scope.items) ? scope.items : [];
            if (!items.length) {
                return '';
            }
            window['resolved_scope_meta_' + messageId] = responseMeta;
            const deviceCount = Number(scope.device_count || items.length || 0);
            const tgCount = Number(scope.tg_count || 0);
            const aggregationScopeCodes = Array.isArray(scope.aggregation_scope_codes) ? scope.aggregation_scope_codes : [];
            const aggregationScopeText = aggregationScopeCodes.length ? aggregationScopeCodes.join('\u3001') : '';
            return `
                <div class="mt-3 rounded-xl border border-indigo-200 bg-indigo-50 p-3 space-y-3">
                    ${aggregationScopeCodes.length ? `
                        <div class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
                            \u5f53\u524d\u4e3a\u8de8\u9879\u76ee\u6c47\u603b\u4f5c\u7528\u57df${aggregationScopeText ? `\uff1a${escapeHtml(aggregationScopeText)}` : ''}
                        </div>
                    ` : ''}
                    <div class="flex items-center justify-between gap-3 flex-wrap">
                        <div>
                            <div class="text-sm font-semibold text-indigo-900">\u5f53\u524d\u786e\u8ba4\u4f5c\u7528\u57df</div>
                            <div class="text-xs text-indigo-700">\u8868\u683c\u3001\u5206\u6790\u4e0e\u56fe\u8868\u5747\u57fa\u4e8e\u4ee5\u4e0b\u8bbe\u5907\u8303\u56f4</div>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap text-xs">
                            <span class="inline-flex items-center rounded-full bg-white px-2.5 py-1 border border-indigo-200 text-indigo-700">\u8bbe\u5907 ${escapeHtml(String(deviceCount))} \u4e2a</span>
                            <span class="inline-flex items-center rounded-full bg-white px-2.5 py-1 border border-indigo-200 text-indigo-700">TG ${escapeHtml(String(tgCount))} \u4e2a</span>
                            <button onclick="requestClearResolvedScope('${messageId}')" class="px-2.5 py-1 rounded-lg border border-indigo-200 bg-white text-indigo-700 hover:bg-indigo-100">\u6e05\u9664\u5f53\u524d\u786e\u8ba4\u8303\u56f4</button>
                        </div>
                    </div>
                    <div class="grid gap-2 ${items.length > 1 ? 'md:grid-cols-2' : ''}">
                        ${items.map(item => {
                            const deviceLabel = item.device || '-';
                            const nameLabel = item.name || '\u672a\u547d\u540d\u8bbe\u5907';
                            const projectLabel = item.project_name || item.project_code_name || '\u672a\u8bc6\u522b\u9879\u76ee';
                            const tgLabel = item.tg || '\u672a\u8bc6\u522bTG';
                            const aliasLabel = item.alias && item.alias !== item.device ? item.alias : '';
                            const canSwitch = Boolean(item.can_switch);
                            return `
                                <div class="rounded-lg border border-indigo-100 bg-white p-3">
                                    <div class="flex items-center justify-between gap-3 flex-wrap">
                                        <div class="text-sm font-semibold text-gray-900 break-all">${escapeHtml(deviceLabel)}</div>
                                        <span class="inline-flex items-center rounded-full bg-indigo-50 px-2 py-0.5 text-xs text-indigo-700 border border-indigo-100">TG ${escapeHtml(tgLabel)}</span>
                                    </div>
                                    <div class="mt-1 text-sm text-gray-700 break-all">${escapeHtml(nameLabel)}</div>
                                    <div class="mt-1 text-xs text-gray-500 break-all">\u9879\u76ee\uff1a${escapeHtml(projectLabel)}</div>
                                    ${aliasLabel ? `<div class="mt-1 text-xs text-gray-500 break-all">\u786e\u8ba4\u8bcd\uff1a${escapeHtml(aliasLabel)}</div>` : ''}
                                    <div class="mt-3 flex items-center justify-end">
                                        ${canSwitch
                                            ? `<button onclick="requestScopeAliasReset('${messageId}', '${escapeHtml(aliasLabel || deviceLabel)}')" class="px-3 py-1.5 rounded-lg bg-white text-xs text-indigo-700 border border-indigo-200 hover:bg-indigo-100">\u66f4\u6362\u8bbe\u5907</button>`
                                            : `<span class="text-xs text-gray-400">\u552f\u4e00\u5339\u914d，\u65e0\u9700\u66f4\u6362</span>`}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function buildAiMessageRenderParts(messageId, text, tableData = null, insightData = null, responseMeta = null) {
            const tableId = 'table-' + Date.now();
            let tableHtml = '';
            const tableState = normalizeChatTableState(tableData, currentQueryParams ? { ...currentQueryParams } : null);
            if (tableState) {
                const activeView = getActiveChatTableView(tableState);
                const headers = activeView.headers || [];
                const pageSize = activeView.pageSize;
                const totalRows = activeView.rows.length;
                const totalCount = activeView.totalCount || totalRows;
                const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
                const pageRows = activeView.rows.slice(0, pageSize);
                const showPager = totalPages > 1 || activeView.hasMore;
                tableHtml = `
                    <div class="mt-3 overflow-x-auto" id="${tableId}">
                        ${tableState.hasToggle ? `
                            <div class="mb-2 flex items-center gap-2 flex-wrap">
                                <button onclick="switchChatTableView('${tableId}', 'summary')" id="${tableId}-toggle-summary" class="px-3 py-1 text-xs rounded-lg border border-indigo-600 bg-indigo-600 text-white">查看汇总</button>
                                <button onclick="switchChatTableView('${tableId}', 'detail')" id="${tableId}-toggle-detail" class="px-3 py-1 text-xs rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">查看原始明细</button>
                            </div>
                        ` : ''}
                        <table class="min-w-full text-sm border border-gray-200 rounded-lg overflow-hidden">
                            <thead class="bg-gray-100">
                                <tr id="${tableId}-head">
                                    ${headers.map(h => `<th class="px-3 py-2 text-left font-medium text-gray-700">${escapeHtml(h)}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200" id="${tableId}-body">
                                ${buildChatTableRowsHtml(headers, pageRows)}
                            </tbody>
                        </table>
                        <div class="flex items-center justify-between mt-2 text-xs text-gray-500 gap-3">
                            <span id="${tableId}-info">显示 1-${Math.min(pageSize, totalRows)} 条，共 ${totalCount} 条记录</span>
                            <div class="flex items-center space-x-2" id="${tableId}-pager" ${showPager ? '' : 'style="display:none;"'}>
                                <span id="${tableId}-pageinfo">第 1 / ${activeView.hasMore ? '?' : totalPages} 页</span>
                                <button onclick="chatTablePrev('${tableId}')" class="px-2 py-1 border rounded hover:bg-gray-100 disabled:opacity-50" id="${tableId}-prev" disabled>上一页</button>
                                <button onclick="chatTableNext('${tableId}')" class="px-2 py-1 border rounded hover:bg-gray-100" id="${tableId}-next">下一页</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            const clarificationHtml = buildClarificationCandidatesHtml(messageId, responseMeta);
            const resolvedScopeHtml = buildResolvedScopeHtml(messageId, responseMeta);
            const inlineInsightHtml = buildInlineInsightHtml(messageId, insightData);
            const executionSteps = Array.isArray(responseMeta?.executionSteps) ? responseMeta.executionSteps : [];
            const executionHtml = executionSteps.length ? `<div id="${messageId}-execution-host"></div>` : '';
            const hasWideContent = Boolean(clarificationHtml || resolvedScopeHtml || inlineInsightHtml);
            const aiBubbleClass = hasWideContent
                ? 'message-ai rounded-2xl rounded-tl-none px-4 py-3 w-full max-w-full xl:max-w-5xl'
                : 'message-ai rounded-2xl rounded-tl-none px-4 py-3 max-w-3xl';

            return {
                tableId,
                tableState,
                tableHtml,
                clarificationHtml,
                resolvedScopeHtml,
                inlineInsightHtml,
                executionSteps,
                executionHtml,
                aiBubbleClass,
                textHtml: `<p class="text-gray-800 whitespace-pre-wrap">${escapeHtml(text)}</p>`,
                insightData,
                responseMeta,
            };
        }

        function applyAiMessageBubble(messageId, bubbleEl, text, tableData = null, insightData = null, responseMeta = null) {
            if (!bubbleEl) return;
            disposeInlineChartsForMessage(messageId);
            const renderParts = buildAiMessageRenderParts(messageId, text, tableData, insightData, responseMeta);
            bubbleEl.className = renderParts.aiBubbleClass;
            bubbleEl.innerHTML = `
                ${renderParts.textHtml}
                ${renderParts.resolvedScopeHtml}
                ${renderParts.executionHtml}
                ${renderParts.clarificationHtml}
                ${renderParts.tableHtml}
                ${renderParts.inlineInsightHtml}
            `;
            if (renderParts.tableState) {
                setTimeout(() => {
                    window['tableData_' + renderParts.tableId] = renderParts.tableState;
                }, 0);
            }
            if (renderParts.executionSteps.length) {
                setTimeout(() => renderExecutionStepsPanel(messageId, renderParts.executionSteps, { totalDurationMs: responseMeta?.total_duration_ms }), 0);
            }
            if (insightData && insightData.showCharts && Array.isArray(insightData.chartSpecs) && insightData.chartSpecs.length) {
                setTimeout(() => initInlineCharts(messageId, insightData.chartSpecs), 0);
            }
        }

        function finalizeStreamingMessage(messageId, text, tableData = null, insightData = null, responseMeta = null) {
            const messageEl = document.getElementById(messageId);
            if (!messageEl) {
                return addMessage(text, 'ai', tableData, insightData, responseMeta);
            }
            const avatarEl = messageEl.children[0];
            const bubbleEl = messageEl.children[1];
            if (avatarEl) {
                avatarEl.className = 'w-10 h-10 rounded-full bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center text-white font-bold flex-shrink-0';
                avatarEl.textContent = 'AI';
            }
            if (!bubbleEl) {
                return addMessage(text, 'ai', tableData, insightData, responseMeta);
            }
            applyAiMessageBubble(messageId, bubbleEl, text, tableData, insightData, responseMeta);
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
            return messageId;
        }

function addMessage(text, type, tableData = null, insightData = null, responseMeta = null) {
            const container = document.getElementById('chatContainer');
            const id = 'msg-' + Date.now();

            const html = type === 'user' ? `
                <div class="flex items-start space-x-3 justify-end" id="${id}">
                    <div class="message-user text-white rounded-2xl rounded-tr-none px-4 py-3 max-w-xl">
                        <p>${escapeHtml(text)}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-500 to-indigo-600 flex items-center justify-center text-white font-bold">?</div>
                </div>
            ` : `
                <div class="flex items-start space-x-3" id="${id}">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center text-white font-bold flex-shrink-0">AI</div>
                    <div></div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', html);
            if (type === 'ai') {
                const bubbleEl = document.querySelector(`#${id} > div:last-child`);
                applyAiMessageBubble(id, bubbleEl, text, tableData, insightData, responseMeta);
            }
            container.scrollTop = container.scrollHeight;
            return id;
        }

function chatTablePrev(tableId) {
            const tableState = window['tableData_' + tableId];
            const activeView = getActiveChatTableView(tableState);
            if (!tableState || !activeView || activeView.currentPage <= 1) return;

            activeView.currentPage--;
            renderChatTable(tableId, tableState);
        }

        async function chatTableNext(tableId) {
            const tableState = window['tableData_' + tableId];
            const activeView = getActiveChatTableView(tableState);
            if (!tableState || !activeView) return;

            const nextPage = activeView.currentPage + 1;
            const startIdx = (nextPage - 1) * activeView.pageSize;

            if (startIdx >= activeView.rows.length && activeView.hasMore && activeView.queryParams) {
                try {
                    const serverPageSize = activeView.serverPageSize || 50;
                    const serverPage = Math.floor(activeView.rows.length / serverPageSize) + 1;
                    const response = await fetch(API_BASE + '/api/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ...activeView.queryParams,
                            page: serverPage,
                            page_size: serverPageSize
                        })
                    });
                    const result = await response.json();

                    if (result.success && Array.isArray(result.data) && result.data.length > 0) {
                        activeView.rows = activeView.rows.concat(buildDetailTableRows(result.data));
                        activeView.hasMore = result.has_more;
                        activeView.totalCount = result.total_count;
                    }
                } catch (e) {
                    console.error('获取更多数据失败:', e);
                }
            }

            if (startIdx < activeView.rows.length) {
                activeView.currentPage = nextPage;
                renderChatTable(tableId, tableState);
            }
        }

        function renderChatTable(tableId, tableState) {
            const activeView = getActiveChatTableView(tableState);
            const head = document.getElementById(tableId + '-head');
            const tbody = document.getElementById(tableId + '-body');
            const prevBtn = document.getElementById(tableId + '-prev');
            const nextBtn = document.getElementById(tableId + '-next');
            const pageInfo = document.getElementById(tableId + '-pageinfo');
            const infoSpan = document.getElementById(tableId + '-info');
            const pager = document.getElementById(tableId + '-pager');

            if (!activeView || !head || !tbody) return;

            const startIdx = (activeView.currentPage - 1) * activeView.pageSize;
            const endIdx = Math.min(startIdx + activeView.pageSize, activeView.rows.length);
            const pageRows = activeView.rows.slice(startIdx, endIdx);
            const totalCount = activeView.totalCount || activeView.rows.length;
            const totalPages = Math.max(1, Math.ceil(totalCount / activeView.pageSize));
            const showPager = totalPages > 1 || activeView.hasMore;

            head.innerHTML = activeView.headers
                .map(h => `<th class="px-3 py-2 text-left font-medium text-gray-700">${escapeHtml(h)}</th>`)
                .join('');
            tbody.innerHTML = buildChatTableRowsHtml(activeView.headers, pageRows);

            if (pageInfo) {
                pageInfo.textContent = `第 ${activeView.currentPage} / ${activeView.hasMore ? '?' : totalPages} 页`;
            }
            if (prevBtn) prevBtn.disabled = activeView.currentPage <= 1;
            if (nextBtn) nextBtn.disabled = !activeView.hasMore && activeView.currentPage >= totalPages;
            if (infoSpan) {
                const visibleStart = activeView.rows.length ? startIdx + 1 : 0;
                infoSpan.textContent = `显示 ${visibleStart}-${endIdx} 条，共 ${totalCount} 条记录`;
            }
            if (pager) {
                pager.style.display = showPager ? '' : 'none';
            }

            updateChatTableToggleButtons(tableId, tableState);
        }

        function addLoadingMessage() {
            const container = document.getElementById('chatContainer');
            const id = 'loading-' + Date.now();
            
            const html = `
                <div class="flex items-start space-x-3" id="${id}">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center text-white font-bold">AI</div>
                    <div class="message-ai rounded-2xl rounded-tl-none px-4 py-3">
                        <div class="flex items-center space-x-2">
                            <div class="loading-spinner"></div>
                            <span class="text-gray-600">思考中...</span>
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        // 移除消息
        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // 显示步骤
        function showSteps(steps) {
            const section = document.getElementById('stepsSection');
            if (section) {
                section.style.display = 'none';
            }
        }

        window.addEventListener('resize', () => {
            inlineChartInstances.forEach((_, chartId) => {
                resizeInlineChart(chartId);
            });
            if (fullscreenChart) {
                try {
                    fullscreenChart.resize();
                } catch (error) {
                    console.warn('resize fullscreen chart failed', error);
                }
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeChartModal();
            }
        });

        async function quickQuery() {
            const deviceCode = document.getElementById('deviceCode').value.trim();
            const dataType = document.getElementById('dataType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const pageSize = parseInt(document.getElementById('pageSize').value);

            if (!deviceCode || !startDate || !endDate) {
                alert('请填写完整的查询条件');
                return;
            }

            currentQueryParams = {
                device_codes: [deviceCode],
                start_time: startDate,
                end_time: endDate,
                data_type: dataType,
                page_size: pageSize
            };
            currentPage = 1;

            await loadTableData();
        }

        // 加载表格数据
        async function loadTableData() {
            if (!currentQueryParams) return;
            
            // 防止重复请求
            if (isLoadingTable) {
                console.log('⚠️ 正在加载中，跳过重复请求');
                return;
            }
            
            isLoadingTable = true;
            console.log(`📊 开始加载第 ${currentPage} 页数据...`);

            const section = document.getElementById('tableSection');
            section.style.display = 'block';
            
            // 恢复传感器数据表头
            const thead = document.querySelector('#quickTableHead tr');
            if (thead) {
                thead.innerHTML = `
                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">时间</th>
                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">设备</th>
                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">标签</th>
                    <th class="px-4 py-3 text-right text-sm font-semibold text-gray-600">数值</th>
                `;
            }
            document.getElementById('paginationSection').style.display = 'flex';
            
            // 禁用分页按钮
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;

            try {
                const response = await fetch(API_BASE + '/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...currentQueryParams,
                        page: currentPage
                    })
                });
                const data = await response.json();

                if (data.success) {
                    tableData = data.data || [];
                    console.log(`✅ 第 ${currentPage} 页加载成功，${tableData.length} 条记录`);
                    if (tableData.length > 0) {
                        console.log(`   第一条: ${tableData[0].time} - ${tableData[0].value}`);
                        console.log(`   最后一条: ${tableData[tableData.length-1].time} - ${tableData[tableData.length-1].value}`);
                    }
                    renderTable(tableData);
                    updatePagination(data);
                    updateStats(data.statistics);
                } else {
                    alert('查询失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('❌ 加载失败:', error);
                alert('网络错误');
            } finally {
                isLoadingTable = false;
            }
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            // 清空旧数据（防止重复）
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-4 py-8 text-center text-gray-500">暂无数据</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map(row => {
                const device = row.device && row.device !== '-' ? escapeHtml(row.device) : '<span class="text-gray-400">-</span>';
                const tag = row.tag && row.tag !== '-' ? `<span class="px-2 py-1 bg-purple-100 text-purple-700 rounded text-xs">${escapeHtml(row.tag)}</span>` : '<span class="text-gray-400">-</span>';
                
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm text-gray-800">${escapeHtml(row.time || '-')}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${device}</td>
                        <td class="px-4 py-3 text-sm">${tag}</td>
                        <td class="px-4 py-3 text-sm text-right font-mono text-gray-800">${row.value !== undefined && row.value !== '' ? row.value : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 更新分页
        function updatePagination(data) {
            document.getElementById('currentPage').textContent = data.page || 1;
            document.getElementById('totalPages').textContent = data.total_pages || 1;
            document.getElementById('totalCount').textContent = data.total_count || 0;
            
            document.getElementById('prevBtn').disabled = (data.page || 1) <= 1;
            document.getElementById('nextBtn').disabled = !data.has_more;
            
            document.getElementById('tableInfo').textContent = 
                data.is_sampled ? '(数据已降采样)' : '';
        }

        // 更新统计
        function updateStats(stats) {
            const section = document.getElementById('statsSection');
            if (stats) {
                section.style.display = 'block';
                document.getElementById('statMin').textContent = stats.min?.toFixed(2) || '-';
                document.getElementById('statMax').textContent = stats.max?.toFixed(2) || '-';
                document.getElementById('statAvg').textContent = stats.avg?.toFixed(2) || '-';
            } else {
                section.style.display = 'none';
            }
        }

        // 上一页
        function prevPage() {
            if (currentPage > 1 && !isLoadingTable) {
                currentPage--;
                console.log(`⬅️ 翻到上一页: ${currentPage}`);
                loadTableData();
            }
        }

        // 下一页
        function nextPage() {
            if (!isLoadingTable) {
                currentPage++;
                console.log(`➡️ 翻到下一页: ${currentPage}`);
                loadTableData();
            }
        }

        // 导出数据
        function exportData() {
            if (tableData.length === 0) {
                alert('没有数据可导出');
                return;
            }

            const csv = [
                ['时间', '设备', '标签', '数值'].join(','),
                ...tableData.map(row => [
                    row.time || '',
                    row.device || '',
                    row.tag || '',
                    row.value || ''
                ].join(','))
            ].join('\n');

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_export_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
